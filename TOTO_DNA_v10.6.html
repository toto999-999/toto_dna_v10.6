<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TOTO_DNA v10.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e272e;
            --win-blue: #0984e3;
            --loss-red: #d63031;
            --draw-green: #00b894;
            --highlight: #9BC2E6;
            --focus-yellow: #fff200;
        }
        /* 기본 폰트 크기 상향 및 정렬 */
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; margin: 0; background: #f1f2f6; font-size: 13.5px; }
        
        /* 비밀번호 화면 */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #2f3640; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .pw-input { padding: 10px; font-size: 20px; text-align: center; border-radius: 5px; border: none; margin-top: 15px; width: 200px; }
        
        /* 상단 바 */
        .top-bar { background: var(--bg-dark); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
        .btn-load { background: #05c46b; color: white; border: none; padding: 8px 18px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .status { color: #f1c40f; font-weight: bold; }
        
        /* 탭 시스템 */
        .tabs { display: flex; background: #dfe4ea; border-bottom: 1px solid #ccc; padding: 0 10px; position: sticky; top: 52px; z-index: 90; }
        .tab-btn { padding: 12px 20px; border: none; cursor: pointer; background: none; font-weight: bold; color: #57606f; font-size: 14px; }
        .tab-btn.active { background: white; border-bottom: 4px solid #05c46b; color: black; }
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }

        /* 테이블 - 열과 행 완벽 정렬 */
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; border: 1px solid #999; }
        th, td { border: 1px solid #ced4da; padding: 8px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #dcdde1; font-weight: bold; color: #2f3640; position: sticky; top: 0; z-index: 10; }
        
        /* 컬럼 간격 최적화 */
        .col-time { width: 85px; } 
        .col-league { width: 100px; } 
        .col-match { width: 230px; } 
        .col-odds { width: 140px; } 
        .col-handi { width: 50px; } 
        .col-result { width: 260px; }

        /* 강조 색상 */
        .pattern-fill { background-color: var(--highlight) !important; color: black !important; font-weight: bold; border-radius: 2px; }
        .smp-mark { background: #3F14F8 !important; color: white !important; font-weight: bold; }
        .win { color: var(--win-blue); font-weight: bold; }
        .draw { color: var(--draw-green); font-weight: bold; }
        .loss { color: var(--loss-red); font-weight: bold; }
        
        .res-text { font-weight: bold; }
        .strong-text { text-decoration: underline; font-size: 14.5px; }
        .sub-prob { color: #0abde3; font-size: 12px; margin-left: 5px; font-weight: bold; }

        /* 상호작용 하이라이트 (5초 유지) */
        .find-focus { background-color: var(--focus-yellow) !important; font-weight: bold; transition: background-color 0.3s ease; }

        tr:hover { background-color: #f1f2f6; cursor: pointer; }

        /* 상세 팝업 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-box { background: #fdfdfd; width: 650px; margin: 50px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .modal-header { background: #1e272e; color: white; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; font-size: 16px; }
        .modal-body { padding: 25px; font-family: 'Consolas', 'Nanum Gothic Coding', monospace; white-space: pre-wrap; line-height: 1.8; color: #2c3e50; font-size: 14px; }
        .close-btn { cursor: pointer; }
    </style>
</head>
<body>

    <!-- 보안 로그인 화면 -->
    <div id="login-screen">
        <h2 style="margin:0;">TOTO_DNA v10.11 ACCESS</h2>
        <p style="color: #bdc3c7;">비밀번호를 입력해 주세요.</p>
        <input type="password" id="pwField" class="pw-input" maxlength="4" placeholder="Password">
        <button onclick="checkPw()" style="margin-top:20px; padding: 10px 40px; cursor:pointer; font-weight:bold;">접속하기</button>
    </div>

    <!-- 메인 콘텐츠 -->
    <div id="main-ui" style="display:none;">
        <div class="top-bar">
            <input type="file" id="fileInput" style="display:none" />
            <button class="btn-load" onclick="document.getElementById('fileInput').click()">1. 엑셀 분석 시작</button>
            <span class="status" id="statusLbl">분석 준비 완료</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnTab1" onclick="tabCtrl(event, 'tab1')">일반 경기</button>
            <button class="tab-btn" id="btnTab2" onclick="tabCtrl(event, 'tab2')">승무패 경기</button>
            <button class="tab-btn" id="btnTab3" onclick="tabCtrl(event, 'tab3')">패턴 통계 검증</button>
        </div>

        <div id="tab1" class="tab-content active">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                        <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                        <th class="col-result">v10.11 정밀 분석 결과</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab2" class="tab-content">
            <table id="smpTable">
                <thead>
                    <tr>
                        <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                        <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                        <th class="col-result">승무패 전용 분석</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab3" class="tab-content">
            <table id="statTable">
                <thead>
                    <tr>
                        <th style="width:100px;">리그</th><th style="width:180px;">패턴 조합</th><th style="width:110px;">추천</th>
                        <th style="width:80px;">성공/전체</th><th style="width:80px;">적중률</th><th>최근 결과</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 분석 모달 -->
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span>🔍 v10.11 정밀 분석 리포트</span>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div style="text-align: center; padding-bottom: 25px;">
                <button onclick="closeModal()" style="padding: 10px 50px; cursor:pointer; font-weight:bold;">내용 확인 완료</button>
            </div>
        </div>
    </div>

    <script>
        // 비밀번호 체크
        function checkPw() {
            const pw = document.getElementById('pwField').value;
            if(pw === '4938') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            } else {
                alert('비밀번호가 올바르지 않습니다.');
                document.getElementById('pwField').value = '';
            }
        }
        // 엔터키 지원
        document.getElementById('pwField').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPw(); });

        let upData = [];
        let scStats = {};
        let tHist = {};
        let h2hHist = {};
        let cL1 = {}, cL2 = {}, cL3 = {};
        let baseColor = "NO_FILL";

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('statusLbl').innerText = "데이터 정밀 분석 중...";
            const wb = new ExcelJS.Workbook();
            const reader = new FileReader();
            reader.onload = async (f) => {
                await wb.xlsx.load(f.target.result);
                const ws = wb.getWorksheet('일반핸디');
                if(!ws) { alert("'일반핸디' 시트를 찾을 수 없습니다."); return; }
                parseExcel(ws);
            };
            reader.readAsArrayBuffer(file);
        });

        function getScenId(league, gPat, hPat) {
            return btoa(unescape(encodeURIComponent(`${league}_${gPat}_${hPat}`))).substring(0, 15);
        }

        function getHexColor(cell) {
            if (!cell || !cell.fill || !cell.fill.fgColor) return "NO_FILL";
            const fg = cell.fill.fgColor;
            if (fg.argb) return fg.argb;
            if (fg.theme !== undefined) return `T${fg.theme}_${fg.tint || 0}`;
            return "NO_FILL";
        }

        function parseExcel(ws) {
            let colors = {};
            for(let i=2; i<=Math.min(ws.rowCount, 100); i++){
                const row = ws.getRow(i);
                [8, 9, 10, 16, 17, 18].forEach(c => {
                    const clr = getHexColor(row.getCell(c));
                    colors[clr] = (colors[clr] || 0) + 1;
                });
            }
            baseColor = Object.keys(colors).reduce((a, b) => colors[a] > colors[b] ? a : b, "NO_FILL");

            const all = [];
            ws.eachRow((row, i) => {
                if(i < 2) return;
                const home = row.getCell(4).value;
                if(!home) return;

                const getOdds = (cols, labels) => {
                    let odds = [], pats = [];
                    cols.forEach((c, idx) => {
                        const cell = row.getCell(c);
                        const clr = getHexColor(cell);
                        const isP = (clr !== "NO_FILL" && clr !== baseColor);
                        const val = cell.value?.result || cell.value;
                        odds.push({v: isNaN(val) ? val : parseFloat(val).toFixed(2), p: isP});
                        if(isP) pats.push(labels[idx]);
                    });
                    return {odds, pats: pats.join("")};
                };

                const g = getOdds([8, 9, 10], ["승", "무", "패"]);
                const h = getOdds([16, 17, 18], ["승", "무", "패"]);
                const isSmp = (getHexColor(row.getCell(3)) !== "NO_FILL" && getHexColor(row.getCell(3)) !== baseColor);

                all.push({
                    time: String(row.getCell(2).value || "").substring(5, 16),
                    league: String(row.getCell(3).value || "").trim(),
                    home: String(home).trim(),
                    away: String(row.getCell(6).value || "").trim(),
                    handi: row.getCell(15).value || "",
                    g_odds: g.odds, g_pat: g.pats,
                    h_odds: h.odds, h_pat: h.pats,
                    is_smp: isSmp,
                    res_g: clean(row.getCell(11).value),
                    res_h: clean(row.getCell(19).value)
                });
            });

            const past = all.filter(d => d.res_g !== "None");
            upData = all.filter(d => d.res_g === "None");

            buildCache(past);
            calcStats(past);
            render();
            document.getElementById('statusLbl').innerText = `완료 (과거:${past.length} / 예정:${upData.length})`;
        }

        function clean(v) {
            if(!v) return "None";
            const s = String(v).trim();
            if(['승','홈승','H'].includes(s)) return '승';
            if(['무','D'].includes(s)) return '무';
            if(['패','원정승','A'].includes(s)) return '패';
            return "None";
        }

        function buildCache(past) {
            cL1 = {}; cL2 = {}; cL3 = {}; tHist = {}; h2hHist = {};
            past.forEach(r => {
                const res = `${r.res_g}/${r.res_h}`;
                const k1 = `${r.league}_${r.handi}_${r.g_pat}`, k2 = `${r.league}_${r.g_pat}`, k3 = `${r.g_pat}_${r.h_pat}`;
                const add = (obj, k) => { if(!obj[k]) obj[k] = {}; obj[k][res] = (obj[k][res]||0)+1; };
                add(cL1, k1); add(cL2, k2); add(cL3, k3);

                if(!tHist[r.home]) tHist[r.home] = []; tHist[r.home].push(r.res_g);
                const aR = r.res_g==='승'?'패':(r.res_g==='패'?'승':'무');
                if(!tHist[r.away]) tHist[r.away] = []; tHist[r.away].push(aR);

                const h2k = [r.home, r.away].sort().join("|");
                if(!h2hHist[h2k]) h2hHist[h2k] = []; h2hHist[h2k].push({h:r.home, r:r.res_g});
            });
        }

        // 일반 추천에 따른 핸디 확률 세부 분석 함수
        function getSubDist(r, mainKey) {
            let subScores = {};
            const lvls = [{d:cL1, w:10, k:`${r.league}_${r.handi}_${r.g_pat}`}, {d:cL2, w:5, k:`${r.league}_${r.g_pat}`}, {d:cL3, w:2, k:`${r.g_pat}_${r.h_pat}`}];
            
            lvls.forEach(l => {
                if(l.d[l.k]) {
                    for(let rk in l.d[l.k]){
                        const [rg, rh] = rk.split("/"), cnt = l.d[l.k][rk];
                        // 메인 추천이 일반 결과일 때 매칭되는 핸디 결과만 수집
                        if(mainKey.includes("일반") && mainKey.includes(rg)) {
                            subScores[rh] = (subScores[rh]||0) + (l.w * cnt);
                        } else if(mainKey.includes("핸디") && mainKey.includes(rh)) {
                            subScores[rg] = (subScores[rg]||0) + (l.w * cnt);
                        }
                    }
                }
            });
            if(Object.keys(subScores).length === 0) return "";
            const total = Object.values(subScores).reduce((a,b)=>a+b);
            const sorted = Object.entries(subScores).sort((a,b)=>b[1]-a[1]);
            const prefix = mainKey.includes("일반") ? "H" : "";
            return " → " + sorted.map(e => `${prefix}${e[0]}(${((e[1]/total)*100).toFixed(0)}%)`).join(", ");
        }

        function getPred(r) {
            if(!r.g_pat && !r.h_pat) return {txt: "패턴없음", best:"", prob:0};
            let s = {}, totalW = 0;
            const lvls = [{d:cL1, w:10, k:`${r.league}_${r.handi}_${r.g_pat}`}, {d:cL2, w:5, k:`${r.league}_${r.g_pat}`}, {d:cL3, w:2, k:`${r.g_pat}_${r.h_pat}`}];
            lvls.forEach(l => {
                if(l.d[l.k]) {
                    for(let rk in l.d[l.k]){
                        const [rg, rh] = rk.split("/"), cnt = l.d[l.k][rk];
                        r.g_pat.split("").forEach(p => { if(rg===p){ const k=`일반[${p}]`; s[k]=(s[k]||0)+(l.w*cnt); } });
                        r.h_pat.split("").forEach(p => { if(rh===p){ const k=`핸디[${p}]`; s[k]=(s[k]||0)+(l.w*cnt); } });
                        totalW += (l.w * cnt);
                    }
                }
            });
            if(Object.keys(s).length === 0) return {txt: "사례부족", best:"", prob:0};
            
            const hM = getMom(r.home).s, aM = getMom(r.away).s;
            if(hM - aM >= 3 && s["일반[승]"]) s["일반[승]"] *= 1.2;
            if(aM - hM >= 3 && s["일반[패]"]) s["일반[패]"] *= 1.2;
            
            const sorted = Object.entries(s).sort((a,b)=>b[1]-a[1]);
            const [best, val] = sorted[0];
            const prob = ((val / Object.values(s).reduce((a,b)=>a+b)) * 100).toFixed(1);
            const subStr = getSubDist(r, best);
            return {txt: `${totalW > 40 ? '[강력] ' : ''}${best} (${prob}%)${subStr}`, best, prob, isStrong: totalW > 40, sub: subStr};
        }

        function getMom(t) {
            const hist = (tHist[t] || []).slice(-5);
            let s = 0; hist.forEach((r,i)=>{ const w=(i+1)*0.2; if(r==='승') s+=3*w; else if(r==='무') s+=w; });
            return {s: s.toFixed(1), h: hist};
        }

        function calcStats(past) {
            scStats = {};
            past.forEach(r => {
                const p = getPred(r);
                if(p.best){
                    const k = getScenId(r.league, r.g_pat, r.h_pat);
                    if(!scStats[k]) scStats[k] = {league: r.league, gp: r.g_pat, hp: r.h_pat, hits:0, total:0, res:[], best:p.best, prob:p.prob};
                    if(p.best.includes(r.res_g) || p.best.includes(r.res_h)) scStats[k].hits++;
                    scStats[k].total++;
                    if(scStats[k].res.length < 5) scStats[k].res.push(`${r.res_g}/${r.res_h}`);
                }
            });
        }

        // 상호작용 (5초 유지)
        function focusScenario(sid) {
            tabCtrl(null, 'tab3', document.getElementById('btnTab3'));
            setTimeout(() => {
                const target = document.getElementById(`scen_${sid}`);
                if(target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    target.classList.add('find-focus');
                    setTimeout(() => target.classList.remove('find-focus'), 5000);
                }
            }, 100);
        }

        function focusMatches(sid) {
            tabCtrl(null, 'tab1', document.getElementById('btnTab1'));
            setTimeout(() => {
                const targets = document.querySelectorAll(`.m-row-${sid}`);
                if(targets.length > 0) {
                    targets[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targets.forEach(t => {
                        t.classList.add('find-focus');
                        setTimeout(() => t.classList.remove('find-focus'), 5000);
                    });
                }
            }, 100);
        }

        function render() {
            const b1 = document.querySelector("#mainTable tbody"), b2 = document.querySelector("#smpTable tbody"), b3 = document.querySelector("#statTable tbody");
            b1.innerHTML = ""; b2.innerHTML = ""; b3.innerHTML = "";

            upData.forEach(r => {
                const p = getPred(r);
                const sid = getScenId(r.league, r.g_pat, r.h_pat);
                const tr = document.createElement("tr");
                tr.className = `m-row-${sid}`;
                tr.onclick = () => { showDetail(r, p); focusScenario(sid); };

                const oddsHtml = (odds) => odds.map(o => `<span class="${o.p?'pattern-fill':''}">${o.v}</span>`).join(" ");
                const resClass = p.best.includes("승")?"win":(p.best.includes("무")?"draw":"loss");
                
                tr.innerHTML = `
                    <td>${r.time}</td>
                    <td class="${r.is_smp?'smp-mark':''}">${r.league}</td>
                    <td style="text-align:left;"><b>${r.home}</b> vs ${r.away}</td>
                    <td>${oddsHtml(r.g_odds)}</td>
                    <td style="color:#888">${r.handi}</td>
                    <td>${oddsHtml(r.h_odds)}</td>
                    <td>
                        <span class="res-text ${resClass} ${p.isStrong?'strong-text':''}">${p.txt.split(' → ')[0]}</span>
                        <span class="sub-prob">${p.sub}</span>
                    </td>
                `;
                b1.appendChild(tr);
                if(r.is_smp) b2.appendChild(tr.cloneNode(true));
            });

            Object.entries(scStats).sort((a,b)=>(b[1].hits/b[1].total)-(a[1].hits/a[1].total)).forEach(([sid, d])=>{
                const acc = ((d.hits/d.total)*100).toFixed(1);
                const tr = document.createElement("tr");
                tr.id = `scen_${sid}`;
                tr.onclick = () => focusMatches(sid);
                const resClass = d.best.includes('승')?'win':(d.best.includes('무')?'draw':'loss');
                tr.innerHTML = `
                    <td>${d.league}</td>
                    <td style="color:#7f8c8d; font-size:12px;">G:${d.gp || '-'} / H:${d.hp || '-'}</td>
                    <td class="${resClass}">${d.best}</td>
                    <td>${d.hits}/${d.total}</td>
                    <td style="color:#e74c3c; font-weight:bold;">${acc}%</td>
                    <td style="font-size:12px;">${d.res.join(" | ")}</td>
                `;
                b3.appendChild(tr);
            });
        }

        function showDetail(r, p) {
            const hM = getMom(r.home), aM = getMom(r.away);
            const h2h = (h2hHist[[r.home,r.away].sort().join("|")] || []).slice(-5).map(m => m.h===r.home?m.r:(m.r==='승'?'패':(m.r==='패'?'승':'무')));
            const sid = getScenId(r.league, r.g_pat, r.h_pat);
            const st = scStats[sid];

            let c = `● 경기 정보 : [${r.league}] ${r.home} vs ${r.away}\n`;
            c += `● 배당 패턴 : 일반(${r.g_pat || '없음'}) / 핸디(${r.h_pat || '없음'}) / H:${r.handi}\n`;
            c += `----------------------------------------------------------\n`;
            c += `▶ 홈 팀 최근 : ${hM.h.join("-") || '기록없음'} (기세 ${hM.s}점)\n`;
            c += `▶ 원정팀 최근 : ${aM.h.join("-") || '기록없음'} (기세 ${aM.s}점)\n`;
            c += `▶ 상대 전적  : ${h2h.join("-") || '기록없음'} (최근 5경기, 홈팀기준)\n`;
            c += `----------------------------------------------------------\n`;
            c += `▶ 종합 분석  : ${p.txt}\n`;
            if(st) {
                c += `▶ 패턴 적중률: ${((st.hits/st.total)*100).toFixed(1)}% (${st.hits}/${st.total}회 성공)\n`;
                c += `▶ 과거 동일 패턴 결과 (최근 5건):\n   [ ${st.res.join(" ], [ ")} ]`;
            }
            document.getElementById('modalBody').innerText = c;
            document.getElementById('modal').style.display = 'block';
        }

        function tabCtrl(e, id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active');
            else if(e) e.currentTarget.classList.add('active');
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>

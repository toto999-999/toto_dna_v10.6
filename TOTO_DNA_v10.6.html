<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TOTO_DNA v10.8 (Column & Color Fixed)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e272e;
            --win-blue: #0984e3;
            --loss-red: #d63031;
            --draw-green: #00b894;
            --highlight: #9BC2E6;
        }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; margin: 0; background: #f1f2f6; font-size: 12px; }
        .top-bar { background: var(--bg-dark); color: white; padding: 10px 20px; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
        .btn-load { background: #05c46b; color: white; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .status { color: #f1c40f; font-weight: bold; }
        
        .tabs { display: flex; background: #dfe4ea; border-bottom: 1px solid #ccc; }
        .tab-btn { padding: 12px 20px; border: none; cursor: pointer; background: none; font-weight: bold; color: #57606f; }
        .tab-btn.active { background: white; border-bottom: 3px solid #05c46b; color: black; }
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        th, td { border: 1px solid #ced4da; padding: 6px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f8f9fa; font-weight: bold; height: 30px; }
        
        /* 컬럼별 너비 지정 */
        .col-time { width: 90px; }
        .col-league { width: 80px; }
        .col-match { width: 220px; }
        .col-odds { width: 150px; }
        .col-handi { width: 50px; }
        .col-result { width: 250px; }

        .pattern-fill { background-color: var(--highlight) !important; color: black !important; font-weight: bold; border: 1px solid #3498db; }
        .smp-mark { background: #3F14F8 !important; color: white !important; }
        .win { color: var(--win-blue); font-weight: bold; }
        .draw { color: var(--draw-green); font-weight: bold; }
        .loss { color: var(--loss-red); font-weight: bold; }
        .strong { background: #eb4d4b; color: white; font-weight: bold; padding: 2px 4px; border-radius: 3px; }
        .sub-text { color: #0abde3; font-size: 11px; font-weight: bold; margin-left: 4px; }

        tr:hover { background-color: #f1f2f6; cursor: pointer; }

        /* 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; }
        .modal-box { background: white; width: 600px; margin: 50px auto; border-radius: 8px; overflow: hidden; }
        .modal-header { background: #2f3640; color: white; padding: 12px 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; font-family: 'Consolas', monospace; white-space: pre-wrap; line-height: 1.6; max-height: 500px; overflow-y: auto; }
        .close-btn { cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <input type="file" id="fileInput" style="display:none" />
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">1. 데이터 정밀 분석 시작</button>
        <span class="status" id="statusLbl">파일을 선택해주세요.</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tabCtrl(event, 'tab1')">일반 경기</button>
        <button class="tab-btn" onclick="tabCtrl(event, 'tab2')">승무패 경기</button>
        <button class="tab-btn" onclick="tabCtrl(event, 'tab3')">시나리오 통계</button>
    </div>

    <div id="tab1" class="tab-content active">
        <table id="mainTable">
            <thead>
                <tr>
                    <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                    <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                    <th class="col-result">분석 결과 (v10.8)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="tab2" class="tab-content">
        <table id="smpTable">
            <thead>
                <tr>
                    <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                    <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                    <th class="col-result">분석 결과</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="tab3" class="tab-content">
        <table id="statTable">
            <thead>
                <tr>
                    <th>리그</th><th>패턴 조합</th><th>추천</th><th>성공/전체</th><th>적중률</th><th>과거 결과</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span>🔍 정밀 분석 리포트</span>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        let upData = [];
        let scStats = {};
        let tHist = {};
        let h2hHist = {};
        let cL1 = {}, cL2 = {}, cL3 = {};
        let baseColor = "NO_FILL";

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('statusLbl').innerText = "엑셀 로딩 및 분석 중...";
            const wb = new ExcelJS.Workbook();
            const reader = new FileReader();
            
            reader.onload = async (f) => {
                await wb.xlsx.load(f.target.result);
                const ws = wb.getWorksheet('일반핸디');
                if(!ws) { alert("'일반핸디' 시트가 없습니다."); return; }
                parseExcel(ws);
            };
            reader.readAsArrayBuffer(file);
        });

        // 색상 추출 로직 보정 (Theme, Indexed, ARGB 모두 대응)
        function getHexColor(cell) {
            if (!cell || !cell.fill || !cell.fill.fgColor) return "NO_FILL";
            const fg = cell.fill.fgColor;
            if (fg.argb) return fg.argb; // 표준 ARGB
            if (fg.theme !== undefined) return `THEME_${fg.theme}_${fg.tint || 0}`; // 테마색
            if (fg.indexed !== undefined) return `INDEX_${fg.indexed}`; // 인덱스색
            return "NO_FILL";
        }

        function parseExcel(ws) {
            // 1. 기본 배경색 학습 (학습 구간 2행~100행)
            let colors = {};
            for(let i=2; i<=Math.min(ws.rowCount, 100); i++){
                const row = ws.getRow(i);
                [8, 9, 10, 16, 17, 18].forEach(c => {
                    const clr = getHexColor(row.getCell(c));
                    colors[clr] = (colors[clr] || 0) + 1;
                });
            }
            baseColor = Object.keys(colors).reduce((a, b) => colors[a] > colors[b] ? a : b, "NO_FILL");

            // 2. 데이터 추출 (1-Based Index 정밀 매칭)
            // Python row[1] -> Excel Col B(2)
            // Python row[7,8,9] -> Excel Col H(8), I(9), J(10)
            const all = [];
            ws.eachRow((row, i) => {
                if(i < 2) return;
                const home = row.getCell(4).value; // D열(4)
                if(!home) return;

                const getOdds = (cols, labels) => {
                    let odds = [], pats = [];
                    cols.forEach((c, idx) => {
                        const cell = row.getCell(c);
                        const clr = getHexColor(cell);
                        const isP = (clr !== "NO_FILL" && clr !== baseColor);
                        const val = cell.value?.result || cell.value;
                        odds.push({v: isNaN(val) ? val : parseFloat(val).toFixed(2), p: isP});
                        if(isP) pats.push(labels[idx]);
                    });
                    return {odds, pats: pats.join("")};
                };

                const g = getOdds([8, 9, 10], ["승", "무", "패"]); // H, I, J
                const h = getOdds([16, 17, 18], ["승", "무", "패"]); // P, Q, R
                const lClr = getHexColor(row.getCell(3)); // C열(3) 리그 색상

                all.push({
                    time: String(row.getCell(2).value || "").substring(5, 16), // B(2)
                    league: String(row.getCell(3).value || "").trim(), // C(3)
                    home: String(home).trim(),
                    away: String(row.getCell(6).value || "").trim(), // F(6)
                    handi: row.getCell(15).value || "", // O(15)
                    g_odds: g.odds, g_pat: g.pats,
                    h_odds: h.odds, h_pat: h.pats,
                    is_smp: (lClr !== "NO_FILL" && lClr !== baseColor),
                    res_g: clean(row.getCell(11).value), // K(11)
                    res_h: clean(row.getCell(19).value)  // S(19)
                });
            });

            const past = all.filter(d => d.res_g !== "None");
            upData = all.filter(d => d.res_g === "None");

            buildCache(past);
            calcStats(past);
            render();
            document.getElementById('statusLbl').innerText = `분석 완료 (과거:${past.length} / 예정:${upData.length})`;
        }

        function clean(v) {
            if(!v) return "None";
            const s = String(v).trim();
            if(['승','홈승','H'].includes(s)) return '승';
            if(['무','D'].includes(s)) return '무';
            if(['패','원정승','A'].includes(s)) return '패';
            return "None";
        }

        // --- 분석 엔진 ---
        function buildCache(past) {
            cL1 = {}; cL2 = {}; cL3 = {}; tHist = {}; h2hHist = {};
            past.forEach(r => {
                const res = `${r.res_g}/${r.res_h}`;
                const k1 = `${r.league}_${r.handi}_${r.g_pat}`, k2 = `${r.league}_${r.g_pat}`, k3 = `${r.g_pat}_${r.h_pat}`;
                const add = (obj, k) => { if(!obj[k]) obj[k] = {}; obj[k][res] = (obj[k][res]||0)+1; };
                add(cL1, k1); add(cL2, k2); add(cL3, k3);

                if(!tHist[r.home]) tHist[r.home] = []; tHist[r.home].push(r.res_g);
                const aR = r.res_g==='승'?'패':(r.res_g==='패'?'승':'무');
                if(!tHist[r.away]) tHist[r.away] = []; tHist[r.away].push(aR);

                const h2k = [r.home, r.away].sort().join("|");
                if(!h2hHist[h2k]) h2hHist[h2k] = []; h2hHist[h2k].push({h:r.home, r:r.res_g});
            });
        }

        function getPred(r) {
            if(!r.g_pat && !r.h_pat) return {txt: "패턴없음", best:"", prob:0};
            let s = {}, totalW = 0;
            const lvls = [
                {d:cL1, w:10, k:`${r.league}_${r.handi}_${r.g_pat}`},
                {d:cL2, w:5, k:`${r.league}_${r.g_pat}`},
                {d:cL3, w:2, k:`${r.g_pat}_${r.h_pat}`}
            ];
            lvls.forEach(l => {
                if(l.d[l.k]) {
                    for(let rk in l.d[l.k]){
                        const [rg, rh] = rk.split("/"), cnt = l.d[l.k][rk];
                        r.g_pat.split("").forEach(p => { if(rg===p){ const k=`일반[${p}]`; s[k]=(s[k]||0)+(l.w*cnt); } });
                        r.h_pat.split("").forEach(p => { if(rh===p){ const k=`핸디[${p}]`; s[k]=(s[k]||0)+(l.w*cnt); } });
                        totalW += (l.w * cnt);
                    }
                }
            });
            if(Object.keys(s).length === 0) return {txt: "데이터 부족", best:"", prob:0};

            // 기세 반영
            const hM = getMom(r.home).s, aM = getMom(r.away).s;
            if(hM - aM >= 3 && s["일반[승]"]) s["일반[승]"] *= 1.2;
            if(aM - hM >= 3 && s["일반[패]"]) s["일반[패]"] *= 1.2;

            const sorted = Object.entries(s).sort((a,b)=>b[1]-a[1]);
            const [best, val] = sorted[0];
            const prob = ((val / Object.values(s).reduce((a,b)=>a+b)) * 100).toFixed(1);
            const pref = totalW > 40 ? "[강력]" : (totalW < 10 ? "[참고]" : "[일반]");
            return {txt: `${pref} ${best} (${prob}%)`, best, prob, pref};
        }

        function getMom(t) {
            const hist = (tHist[t] || []).slice(-5);
            let s = 0; hist.forEach((r,i)=>{ const w=(i+1)*0.2; if(r==='승') s+=3*w; else if(r==='무') s+=w; });
            return {s: s.toFixed(1), h: hist};
        }

        function calcStats(past) {
            scStats = {};
            past.forEach(r => {
                const p = getPred(r);
                if(p.best){
                    const k = `${r.league}_${r.g_pat}_${r.h_pat}`;
                    if(!scStats[k]) scStats[k] = {hits:0, total:0, res:[], best:p.best, prob:p.prob};
                    if(p.best.includes(r.res_g) || p.best.includes(r.res_h)) scStats[k].hits++;
                    scStats[k].total++;
                    if(scStats[k].res.length < 5) scStats[k].res.push(`${r.res_g}/${r.res_h}`);
                }
            });
        }

        // --- 렌더링 ---
        function render() {
            const b1 = document.querySelector("#mainTable tbody"), b2 = document.querySelector("#smpTable tbody"), b3 = document.querySelector("#statTable tbody");
            b1.innerHTML = ""; b2.innerHTML = ""; b3.innerHTML = "";

            upData.forEach(r => {
                const p = getPred(r);
                const tr = document.createElement("tr");
                tr.onclick = () => showDetail(r, p);

                const oddsHtml = (odds) => odds.map(o => `<span class="${o.p?'pattern-fill':''}">${o.v}</span>`).join(" ");
                const resClass = p.best.includes("승")?"win":(p.best.includes("무")?"draw":"loss");
                
                tr.innerHTML = `
                    <td>${r.time}</td>
                    <td class="${r.is_smp?'smp-mark':''}">${r.league}</td>
                    <td style="text-align:left;"><b>${r.home}</b> vs ${r.away}</td>
                    <td>${oddsHtml(r.g_odds)}</td>
                    <td style="color:#999">${r.handi}</td>
                    <td>${oddsHtml(r.h_odds)}</td>
                    <td class="${resClass} ${p.pref==='[강력]'?'strong':''}">${p.txt}</td>
                `;
                b1.appendChild(tr);
                if(r.is_smp) b2.appendChild(tr.cloneNode(true));
            });

            Object.entries(scStats).sort((a,b)=>(b[1].hits/b[1].total)-(a[1].hits/a[1].total)).forEach(([k,d])=>{
                const [l, gp, hp] = k.split("_");
                const acc = ((d.hits/d.total)*100).toFixed(1);
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${l}</td><td>G:${gp}/H:${hp}</td><td>${d.best}</td><td>${d.hits}/${d.total}</td><td style="color:red;font-weight:bold">${acc}%</td><td>${d.res.join(", ")}</td>`;
                b3.appendChild(tr);
            });
        }

        function showDetail(r, p) {
            const hM = getMom(r.home), aM = getMom(r.away);
            const h2h = (h2hHist[[r.home,r.away].sort().join("|")] || []).slice(-5).map(m => m.h===r.home?m.r:(m.r==='승'?'패':(m.r==='패'?'승':'무')));

            let c = `[${r.league}] ${r.home} vs ${r.away}\n`;
            c += `패턴: 일반(${r.g_pat || '없음'}) / 핸디(${r.h_pat || '없음'}) / H:${r.handi}\n`;
            c += `--------------------------------------------------\n`;
            c += `▶ 홈팀 최근: ${hM.h.join("-") || '기록없음'} (기세 ${hM.s})\n`;
            c += `▶ 원정 최근: ${aM.h.join("-") || '기록없음'} (기세 ${aM.s})\n`;
            c += `▶ 상대 전적: ${h2h.join("-") || '기록없음'} (홈기준)\n`;
            c += `--------------------------------------------------\n`;
            c += `▶ 분석 결과: ${p.txt}\n`;
            
            const st = scStats[`${r.league}_${r.g_pat}_${r.h_pat}`];
            if(st) c += `▶ 통계 적중률: ${((st.hits/st.total)*100).toFixed(1)}% (${st.hits}/${st.total}회)`;

            document.getElementById('modalBody').innerText = c;
            document.getElementById('modal').style.display = 'block';
        }

        function tabCtrl(e, id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>

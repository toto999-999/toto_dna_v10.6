<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTO_DNA v10.6.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e272e;
            --win-blue: #0984e3;
            --loss-red: #d63031;
            --draw-green: #00b894;
            --highlight: #9BC2E6;
            --focus-yellow: #fff200;
        }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; margin: 0; background: #f1f2f6; font-size: 13.5px; }
        
        /* 로그인 화면 */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #2f3640; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .pw-input { padding: 15px; font-size: 26px; text-align: center; border-radius: 8px; border: none; margin-top: 15px; width: 200px; letter-spacing: 5px; }
        .btn-login { margin-top: 25px; padding: 15px 60px; font-size: 18px; cursor:pointer; font-weight:bold; background: #05c46b; color: white; border: none; border-radius: 8px; }
        
        /* 상단 바 */
        .top-bar { background: var(--bg-dark); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-load, .btn-reset { color: white; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 4px; min-width: 170px; font-size: 14px; }
        .btn-load { background: #05c46b; }
        .btn-reset { background: #f39c12; }
        
        /* 탭 */
        .tabs { display: flex; background: #dfe4ea; border-bottom: 1px solid #ccc; padding: 0 10px; position: sticky; top: 58px; z-index: 90; }
        .tab-btn { padding: 15px 25px; border: none; cursor: pointer; background: none; font-weight: bold; color: #57606f; font-size: 15px; }
        .tab-btn.active { background: white; border-bottom: 4px solid #05c46b; color: black; }
        .tab-content { display: none; padding: 8px; }
        .tab-content.active { display: block; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        th, td { border: 1px solid #ced4da; padding: 8px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #dcdde1; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        
        .col-time { width: 80px; } 
        .col-league { width: 100px; } 
        .col-match { width: 210px; } 
        .col-odds { width: 120px; } 
        .col-handi { width: 40px; } 
        .col-result { width: 330px; }

        .pattern-fill { background-color: var(--highlight) !important; color: black !important; font-weight: bold; }
        .smp-mark { background: #3F14F8 !important; color: white !important; font-weight: bold; }
        .win { color: var(--win-blue); font-weight: bold; }
        .draw { color: var(--draw-green); font-weight: bold; }
        .loss { color: var(--loss-red); font-weight: bold; }
        
        /* 하이라이트 효과 */
        .find-focus { background-color: var(--focus-yellow) !important; color: black !important; font-weight: bold; outline: 2px solid black; }
        tr:hover { background-color: #f8f9fa; cursor: pointer; }

        /* 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-box { background: white; width: 90%; max-width: 600px; margin: 50px auto; border-radius: 8px; overflow: hidden; }
        .modal-header { background: #2f3640; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: #05c46b;">TOTO_DNA ACCESS</h2>
        <input type="password" id="pwField" class="pw-input" maxlength="4">
        <button onclick="checkPw()" class="btn-login">접속</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="top-bar">
            <input type="file" id="fileInput" style="display:none" accept=".xlsx" />
            <button class="btn-load" onclick="document.getElementById('fileInput').click()">1. 데이터 불러오기</button>
            <button class="btn-reset" onclick="clearFocus()">🔍 하이라이트 초기화</button>
            <span id="statusLbl" style="color:#f1c40f; font-weight:bold;">대기중...</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnTab1" onclick="tabCtrl('tab1')">일반 경기</button>
            <button class="tab-btn" id="btnTab2" onclick="tabCtrl('tab2')">승무패 경기</button>
            <button class="tab-btn" id="btnTab3" onclick="tabCtrl('tab3')">패턴 통계 검증</button>
        </div>

        <div id="tab1" class="tab-content active">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                        <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                        <th class="col-result">v10.6 분석 결과</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab2" class="tab-content">
            <table id="smpTable">
                <thead>
                    <tr>
                        <th class="col-time">시간</th><th class="col-league">리그</th><th class="col-match">매치업</th>
                        <th class="col-odds">일반배당</th><th class="col-handi">H</th><th class="col-odds">핸디배당</th>
                        <th class="col-result">승무패 패턴 분석</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab3" class="tab-content">
            <table id="statTable">
                <thead>
                    <tr>
                        <th style="width:100px;">리그</th><th style="width:160px;">패턴 조합</th><th style="width:100px;">추천</th>
                        <th style="width:80px;">성공/전체</th><th style="width:80px;">적중률</th><th>최근 결과</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header"><span>분석 리포트</span><span style="cursor:pointer" onclick="closeModal()">&times;</span></div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        function checkPw() { if(document.getElementById('pwField').value==='4938'){ document.getElementById('login-screen').style.display='none'; document.getElementById('main-ui').style.display='block'; } else alert('오류'); }
        
        let upData = [], scStats = {}, tHist = {}, h2hHist = {}, cL1 = {}, cL2 = {}, cL3 = {}, baseColor = "NO_FILL";

        // [핵심] 리그, 일반패턴, 핸디패턴을 엄격하게 결합한 유일 ID 생성
        function getScenId(league, gPat, hPat) {
            if(!gPat && !hPat) return "NO_PATTERN"; // 패턴 없으면 ID 생성 안함
            const key = `${league.trim()}_G${gPat || 'X'}_H${hPat || 'X'}`;
            // CSS 클래스명으로 안전하게 사용하기 위해 Base64에서 특수문자 제거
            return "sid_" + btoa(unescape(encodeURIComponent(key))).replace(/[/+=]/g, "");
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('statusLbl').innerText = "분석 중...";
            const wb = new ExcelJS.Workbook();
            const reader = new FileReader();
            reader.onload = async (f) => {
                await wb.xlsx.load(f.target.result);
                const ws = wb.getWorksheet('일반핸디');
                if(ws) parseExcel(ws);
            };
            reader.readAsArrayBuffer(file);
        });

        function getHexColor(cell) {
            if (!cell || !cell.fill || !cell.fill.fgColor) return "NO_FILL";
            const fg = cell.fill.fgColor;
            return fg.argb || (fg.theme !== undefined ? `T${fg.theme}_${fg.tint || 0}` : "NO_FILL");
        }

        function clean(v) {
            const s = String(v || "None").trim();
            if(['승','홈승','H'].includes(s)) return '승';
            if(['무','D'].includes(s)) return '무';
            if(['패','원정승','A'].includes(s)) return '패';
            return "None";
        }

        function parseExcel(ws) {
            let colors = {};
            for(let i=2; i<=Math.min(ws.rowCount, 100); i++){
                const row = ws.getRow(i);
                [8, 9, 10, 16, 17, 18].forEach(c => {
                    const clr = getHexColor(row.getCell(c));
                    colors[clr] = (colors[clr] || 0) + 1;
                });
            }
            baseColor = Object.keys(colors).reduce((a, b) => colors[a] > colors[b] ? a : b, "NO_FILL");

            const all = [];
            ws.eachRow((row, i) => {
                if(i < 2) return;
                const home = row.getCell(4).value;
                if(!home) return;
                const getOdds = (cols, labels) => {
                    let odds = [], pats = [];
                    cols.forEach((c, idx) => {
                        const cell = row.getCell(c);
                        const clr = getHexColor(cell);
                        const isP = (clr !== "NO_FILL" && clr !== baseColor);
                        const val = cell.value?.result || cell.value;
                        odds.push({v: isNaN(val) ? val : parseFloat(val).toFixed(2), p: isP});
                        if(isP) pats.push(labels[idx]);
                    });
                    return {odds, pats: pats.join("")};
                };
                const g = getOdds([8, 9, 10], ["승", "무", "패"]);
                const h = getOdds([16, 17, 18], ["승", "무", "패"]);
                const isSmp = (getHexColor(row.getCell(3)) !== "NO_FILL" && getHexColor(row.getCell(3)) !== baseColor);

                all.push({
                    time: String(row.getCell(2).value || "").substring(5, 16),
                    league: String(row.getCell(3).value || "").trim(),
                    home: String(home).trim(), away: String(row.getCell(6).value || "").trim(),
                    handi: row.getCell(15).value || "",
                    g_odds: g.odds, g_pat: g.pats, h_odds: h.odds, h_pat: h.pats,
                    is_smp: isSmp, res_g: clean(row.getCell(11).value), res_h: clean(row.getCell(19).value)
                });
            });

            const past = all.filter(d => d.res_g !== "None");
            upData = all.filter(d => d.res_g === "None");

            cL1 = {}; cL2 = {}; cL3 = {}; tHist = {}; h2hHist = {};
            past.forEach(r => {
                const res = `${r.res_g}/${r.res_h}`;
                const k1 = `${r.league}_${r.handi}_${r.g_pat}`, k2 = `${r.league}_${r.g_pat}`, k3 = `${r.g_pat}_${r.h_pat}`;
                const add = (obj, k) => { if(!obj[k]) obj[k] = {}; obj[k][res] = (obj[k][res]||0)+1; };
                add(cL1, k1); add(cL2, k2); add(cL3, k3);
                if(!tHist[r.home]) tHist[r.home] = []; tHist[r.home].push(r.res_g);
                const aR = r.res_g==='승'?'패':(r.res_g==='패'?'승':'무');
                if(!tHist[r.away]) tHist[r.away] = []; tHist[r.away].push(aR);
                const h2k = [r.home, r.away].sort().join("|");
                if(!h2hHist[h2k]) h2hHist[h2k] = []; h2hHist[h2k].push({h:r.home, r:r.res_g});
            });

            scStats = {};
            past.forEach(r => {
                const p = getPred(r);
                if(p.best){
                    const k = getScenId(r.league, r.g_pat, r.h_pat);
                    if(k === "NO_PATTERN") return;
                    if(!scStats[k]) scStats[k] = {league: r.league, gp: r.g_pat, hp: r.h_pat, hits:0, total:0, res:[], best:p.best};
                    if(p.best.includes(r.res_g) || p.best.includes(r.res_h)) scStats[k].hits++;
                    scStats[k].total++;
                    if(scStats[k].res.length < 5) scStats[k].res.push(`${r.res_g}/${r.res_h}`);
                }
            });

            render();
            document.getElementById('statusLbl').innerText = `분석완료 (${upData.length}경기)`;
        }

        function getPred(r) {
            if(!r.g_pat && !r.h_pat) return {txt: "패턴없음", best:"", prob:0};
            let s = {}, totalW = 0;
            const lvls = [cL1[`${r.league}_${r.handi}_${r.g_pat}`], cL2[`${r.league}_${r.g_pat}`], cL3[`${r.g_pat}_${r.h_pat}`]];
            lvls.forEach((lvlData, i) => {
                if(!lvlData) return;
                const weight = [10, 5, 2][i];
                for(let rk in lvlData) {
                    const [rg, rh] = rk.split("/"), cnt = lvlData[rk];
                    r.g_pat.split("").forEach(p => { if(rg===p) s[`일반[${p}]`] = (s[`일반[${p}]`]||0) + (weight*cnt); });
                    r.h_pat.split("").forEach(p => { if(rh===p) s[`핸디[${p}]`] = (s[`핸디[${p}]`]||0) + (weight*cnt); });
                    totalW += (weight * cnt);
                }
            });
            if(Object.keys(s).length === 0) return {txt: "사례부족", best:"", prob:0};
            const sorted = Object.entries(s).sort((a,b)=>b[1]-a[1]);
            const [best, val] = sorted[0];
            const prob = ((val / Object.values(s).reduce((a,b)=>a+b)) * 100).toFixed(1);
            return {txt: `${totalW > 40 ? '[강격] ' : ''}${best} (${prob}%)`, best, prob, isStrong: totalW > 40};
        }

        function clearFocus() { document.querySelectorAll('.find-focus').forEach(el => el.classList.remove('find-focus')); }

        function tabCtrl(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btnMap = {'tab1':'btnTab1', 'tab2':'btnTab2', 'tab3':'btnTab3'};
            document.getElementById(btnMap[id]).classList.add('active');
        }

        // 경기 -> 통계로 이동 (엄격한 sid 기준)
        function focusScenario(sid) {
            if(sid === "NO_PATTERN") return;
            clearFocus();
            tabCtrl('tab3');
            setTimeout(() => {
                const target = document.getElementById(sid);
                if(target) {
                    target.classList.add('find-focus');
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // 통계 -> 모든 경기들 강조 (엄격한 sid 기준)
        function focusMatches(sid) {
            clearFocus();
            tabCtrl('tab1'); // 우선 일반탭으로 이동
            setTimeout(() => {
                const targets = document.querySelectorAll(`.${sid}`);
                if(targets.length > 0) {
                    targets.forEach(t => t.classList.add('find-focus'));
                    targets[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    alert("예정된 경기 중 동일 패턴 조합이 없습니다.");
                }
            }, 100);
        }

        function render() {
            const b1 = document.querySelector("#mainTable tbody"), 
                  b2 = document.querySelector("#smpTable tbody"), 
                  b3 = document.querySelector("#statTable tbody");
            b1.innerHTML = ""; b2.innerHTML = ""; b3.innerHTML = "";

            upData.forEach(r => {
                const p = getPred(r);
                const sid = getScenId(r.league, r.g_pat, r.h_pat);
                
                const createRow = () => {
                    const tr = document.createElement("tr");
                    if(sid !== "NO_PATTERN") tr.classList.add(sid); // sid 클래스 부여
                    tr.onclick = () => { showDetail(r, p); focusScenario(sid); };
                    const oddsHtml = (odds) => odds.map(o => `<span class="${o.p?'pattern-fill':''}">${o.v}</span>`).join(" ");
                    const resClass = p.best.includes("승")?"win":(p.best.includes("무")?"draw":"loss");
                    tr.innerHTML = `
                        <td>${r.time}</td>
                        <td class="${r.is_smp?'smp-mark':''}">${r.league}</td>
                        <td style="text-align:left;"><b>${r.home}</b> vs ${r.away}</td>
                        <td>${oddsHtml(r.g_odds)}</td>
                        <td style="color:#888">${r.handi}</td>
                        <td>${oddsHtml(r.h_odds)}</td>
                        <td class="res-text ${resClass}">${p.txt}</td>
                    `;
                    return tr;
                };

                b1.appendChild(createRow());
                if(r.is_smp) b2.appendChild(createRow()); // 승무패 탭에도 동일 로직 적용
            });

            Object.entries(scStats).sort((a,b)=>(b[1].hits/b[1].total)-(a[1].hits/a[1].total)).forEach(([sid, d])=>{
                const acc = ((d.hits/d.total)*100).toFixed(1);
                const tr = document.createElement("tr");
                tr.id = sid; // 통계 행의 ID를 sid로 설정
                tr.onclick = () => focusMatches(sid);
                const resClass = d.best.includes('승')?'win':(d.best.includes('무')?'draw':'loss');
                tr.innerHTML = `
                    <td>${d.league}</td>
                    <td style="color:#7f8c8d; font-size:12px;">G:${d.gp || '-'} / H:${d.hp || '-'}</td>
                    <td class="${resClass}">${d.best}</td>
                    <td>${d.hits}/${d.total}</td>
                    <td style="color:#e74c3c; font-weight:bold;">${acc}%</td>
                    <td style="font-size:12px;">${d.res.join(" | ")}</td>
                `;
                b3.appendChild(tr);
            });
        }

        function showDetail(r, p) {
            const hist = (tHist[r.home] || []).slice(-3);
            const st = scStats[getScenId(r.league, r.g_pat, r.h_pat)];
            let c = `● [${r.league}] ${r.home} vs ${r.away}\n`;
            c += `● 패턴: 일반(${r.g_pat || '없음'}) / 핸디(${r.h_pat || '없음'})\n`;
            c += `-------------------------------------------\n`;
            c += `▶ 분석 결과: ${p.txt}\n`;
            if(st) c += `▶ 패턴 성적: ${((st.hits/st.total)*100).toFixed(1)}% (${st.hits}/${st.total}회)\n`;
            document.getElementById('modalBody').innerText = c;
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
